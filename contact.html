<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Southwest Exchange</title>
  <!-- Google Fonts for Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap"
    rel="stylesheet">
  <script type="module" crossorigin src="./assets/style-9wOPuaAa.js"></script>
  <script type="module" crossorigin src="./assets/main-DO5pNP2S.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/style-jstL1YTe.css">
</head>

<body>
  <!-- Top Header -->
  <header class="top-header">
    <a href="/index.html" style="text-decoration: none;">
      <h1 class="logo-text">SOUTH WEST<br><span class="highlight">EXCHANGE</span></h1>
    </a>
    <img src="./logo.png" alt="Southwest Exchange Logo" class="logo-image top-logo">
  </header>

  <!-- Geometric Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="diamond"></div>
    <div class="diamond center-diamond"></div>
    <div class="diamond"></div>
    <div class="divider-line"></div>
  </div>

  <!-- Main Southwest Thematic Area -->
  <main class="main-layout">
    <!-- Background spans the whole area: Arizona -> NM -> Texas -->
    <div class="thematic-backdrop"></div>

    <!-- Contact Content Section -->
    <section class="info-section">
      <div class="content-card glass-panel" style="max-width: 700px;">
        <h2 style="color: var(--sw-gold); font-size: 2.5rem; margin-bottom: 0.5rem;">Get in Touch</h2>
        <p style="color: rgba(235, 216, 183, 0.9); margin-bottom: 2rem; font-size: 1.1rem;">
          Have questions about shipping, inventory, or a specific item? Send us a message and we'll get right back to you.
        </p>
        
        <!-- Web3Forms Contact Form -->
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
          <input type="hidden" name="access_key" value="f4c0d9b1-82a7-4a7e-97a5-a3551cab077b">
          
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
          </div>
          
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com">
          </div>
          
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required placeholder="Question about an item">
          </div>
          
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
          </div>
          
          <!-- Bot Protection (Honeypot) -->
          <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
          
          <!-- Optional: Redirect after successful submission to a custom thank you page -->
          <!-- <input type="hidden" name="redirect" value="https://yourwebsite.com/thanks.html"> -->
          
          <button type="submit" class="submit-btn">Send Message</button>
        </form>

      </div>
    </section>

    <!-- Footer / Hard Links -->
    <footer class="bottom-links glass-panel-dark">
      <div class="footer-layout">
        <div class="links-grid">
          <a href="/index.html" class="hard-link">Home</a>
          <a href="/about.html" class="hard-link">About</a>

          <!-- Social and External Links -->
          <a href="https://www.facebook.com/swexchange" target="_blank" rel="noopener noreferrer" class="hard-link">
            Facebook
          </a>
          <a href="https://www.whatnot.com/user/tylerswexchange" target="_blank" rel="noopener noreferrer"
            class="hard-link">
            Whatnot
          </a>
          <a href="https://www.ebay.com/usr/swexchange" target="_blank" rel="noopener noreferrer" class="hard-link">
            Ebay
          </a>
          <a href="https://www.instagram.com/swexchange.tyler/" target="_blank" rel="noopener noreferrer"
            class="hard-link">
            Insta
          </a>
          <a href="/metal-tracker.html" class="hard-link">Metal Tracker</a>
        </div>
        <div class="footer-logo-container">
          <img src="./logo.png" alt="Southwest Exchange Logo" class="logo-image bottom-logo">
        </div>
      </div>
    </footer>
  </main>

</body>

</html>
