<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metal Tracker - Southwest Exchange</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
  <script type="module" crossorigin src="./assets/metalTracker-DqGz_M17.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/style-9wOPuaAa.js">
  <link rel="stylesheet" crossorigin href="./assets/style-jstL1YTe.css">
</head>

<body>
    <!-- Top Header -->
    <header class="top-header">
        <a href="/index.html" style="display: block;">
            <h1 class="logo-text">SOUTH WEST<br><span class="highlight">EXCHANGE</span></h1>
        </a>
        <a href="/index.html">
            <img src="./logo.png" alt="Southwest Exchange Logo" class="logo-image top-logo">
        </a>
    </header>

    <!-- Geometric Divider -->
    <div class="divider">
        <div class="divider-line"></div>
        <div class="diamond"></div>
        <div class="diamond center-diamond"></div>
        <div class="diamond"></div>
        <div class="divider-line"></div>
    </div>

    <!-- Main Southwest Thematic Area -->
    <main class="main-layout metal-tracker-layout">
        <div class="thematic-backdrop"></div>

        <section class="metals-section">
            <div class="intro-card glass-panel-dark">
                <h2>Live Metal Tracker</h2>
                <p>Stay up to date with historical trends and live valuations of both precious and base metals. All charts track performance up to the current day.</p>
            </div>

            <!-- PRECIOUS METALS -->
            <h3 class="metals-category-title">Precious Metals</h3>
            <div class="metals-grid" id="precious-metals-grid">
                <div class="metal-card glass-panel" id="chart-gold"></div>
                <div class="metal-card glass-panel" id="chart-silver"></div>
                <div class="metal-card glass-panel" id="chart-platinum"></div>
                <div class="metal-card glass-panel" id="chart-palladium"></div>
            </div>

            <!-- Geometric Divider -->
            <div class="spacer-divider">
                <div class="divider-line half-line"></div>
                <div class="diamond"></div>
                <div class="divider-line half-line"></div>
            </div>

            <!-- BASE METALS -->
            <h3 class="metals-category-title">Base Metals</h3>
            <div class="metals-grid" id="base-metals-grid">
                <div class="metal-card glass-panel" id="chart-copper"></div>
                <div class="metal-card glass-panel" id="chart-aluminum"></div>
                <div class="metal-card glass-panel" id="chart-lead"></div>
                <div class="metal-card glass-panel" id="chart-nickel"></div>
            </div>
        </section>

        <!-- Footer / Hard Links -->
        <footer class="bottom-links glass-panel-dark">
            <div class="footer-layout">
                <div class="links-grid">
                    <a href="/index.html" class="hard-link">Home</a>
                    <a href="/about.html" class="hard-link">About</a>
                    
                    <!-- Social and External Links -->
                    <a href="https://www.facebook.com/swexchange" target="_blank" rel="noopener noreferrer" class="hard-link">
                        Facebook
                    </a>
                    <a href="https://www.whatnot.com/user/tylerswexchange" target="_blank" rel="noopener noreferrer"
                        class="hard-link">
                        Whatnot
                    </a>
                    <a href="https://www.ebay.com/usr/swexchange" target="_blank" rel="noopener noreferrer" class="hard-link">
                        Ebay
                    </a>
                    <a href="https://www.instagram.com/swexchange.tyler/" target="_blank" rel="noopener noreferrer" class="hard-link">
                        Insta
                    </a>
                    <a href="/metal-tracker.html" class="hard-link">Metal Tracker</a>
                    <a href="/contact.html" class="hard-link">Contact</a>
                </div>
                <div class="footer-logo-container">
                    <img src="./logo.png" alt="Southwest Exchange Logo" class="logo-image bottom-logo">
                </div>
            </div>
        </footer>
    </main>

</body>

</html>
